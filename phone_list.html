<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전화번호 목록</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/phone_list.css') }}">
</head>

<body>

<div class="container">

    <div class="header">

        <h1>전화번호 목록</h1>

        <a href="/phone" class="btn">
            + 새 연락처 등록
        </a>

    </div>

    <div class="table-box">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>이름</th>
                    <th>전화번호</th>
                    <th>메모</th>
                    <th>등록일</th>
                </tr>
            </thead>

            <tbody>

            {% for row in rows %}

                <tr>

                    <td>{{ row[0] }}</td>

                    <td>{{ row[1] }}</td>

                    <td>{{ row[2] }}</td>

                    <td>{{ row[3] }}</td>

                    <td>{{ row[4].strftime('%Y-%m-%d %H:%M') }}</td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
